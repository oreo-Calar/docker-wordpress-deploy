# 定义服务列表，每个服务对应一个 Docker 容器
services:
  # ===========MySQL数据库服务=============
  db:
    image: mysql:8.0                      # 使用官方 MySQL 8.0 镜像
    container_name: wp-db                 # 给容器起一个固定名称，方便管理
    restart: unless-stopped               # 除非手动停止，否则容器退出后总是自动重启
  # 环境变量
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}    # 数据库root用户密码
      MYSQL_DATABASE: ${MYSQL_DATABASE}              # 自动创建名为wordpress
      MYSQL_USER: ${MYSQL_USER}                      # 自动创建一个普通用户
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}              # 普通用户的密码
  # 数据卷挂载
    volumes:
      - db_data:/var/lib/mysql                   # 将命名卷 db_data 挂载到 MySQL 数据目录，实现数据持久化
    networks:
      - wp-net                                   # 加入自定义网络 wp-net，使容器间可通过服务名通信
  # 健康检查，用于判断容器是否真正就绪
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s                              # 每 10 秒检查一次
      timeout: 5s                                # 单次检查超时时间
      retries: 5                                 # 连续失败 5 次才标记为不健康

  # ===========WordPress应用服务=============
  wordpress:
    image: wordpress:php8.2-apache                   # 官方 WordPress 镜像（内置 Apache + PHP 8.2）
    container_name: wp-app
    restart: unless-stopped
  # 环境变量 
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}           # 与上方一致
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |                          # 通过环境变量注入额外的 PHP 配置代码
        define('WP_SITEURL', '${SITE_URL}');             # 强制站点 URL
        define('WP_HOME', '${SITE_URL}');                # 强制首页 URL
        define('WPLANG', 'zh_CN');                       # 启用中文界面
  # 数据卷挂载
    volumes:
      - wp_data:/var/www/html                     # 持久化 WordPress 程序文件、插件、主题、上传内容
    networks:
      - wp-net
    depends_on:                                   # 依赖关系，控制启动顺序
      db:
        condition: service_healthy                # 等待 db 容器健康检查通过后才启动 WordPress

  # ===========Nginx反向代理服务=============
  nginx:
    image: nginx:alpine                           # 轻量级 Nginx 镜像
    container_name: wp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"                                 # 将宿主机的 8080 端口映射到容器的 80 端口
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro          # 挂载自定义 Nginx 配置文件，ro表示只读，防止容器内篡改
    networks:
      - wp-net
    depends_on:
      - wordpress                                 # 等待 wordpress 容器启动后再启动 Nginx

# ===============命名卷定义==================
volumes:
  db_data:                # MySQL 数据卷
  wp_data:                # WordPress 网站文件卷

# ==============自定义网络定义===============
networks:
  wp-net:                 # 创建一个桥接网络，所有服务加入此网络后可直接用服务名互相访问
    driver: bridge