# 定义一个虚拟服务器，监听 80 端口（HTTP 默认端口）
server {
    listen 80;                         # 监听 IPv4 的 80 端口
    server_name _;                     # 匹配所有域名，可用于ip访问

    # 定义请求处理规则，location / 匹配所有请求路径
    location / {
        # 将请求转发给名为 wordpress 的后端服务（容器服务名），端口为 80
        proxy_pass http://wordpress:80;

        # 设置代理请求头，将原始客户端信息传递给后端
        proxy_set_header Host $host;                    # 传递客户端请求的原始 Host 头
        proxy_set_header X-Real-IP $remote_addr;        # 传递客户端真实 IP 地址
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        # 追加代理链中的所有 IP
        proxy_set_header X-Forwarded-Proto $scheme;     # 传递客户端使用的协议（http 或 https）

        # ❗️修正后端 WordPress 返回的重定向地址
        # 因为 WordPress 内部可能返回 http://localhost 或 http://wordpress 的 Location，
        # 导致浏览器跳转到错误的地址，这里强制将响应头中的 Location 改写为正确的公网访问地址。
        # ⚠️ 使用前请将下面三行中的 http://your_ip:port/ 替换为实际访问地址（例如 http://192.168.0.30:8080/）
        proxy_redirect http://localhost:8080/ http://your_ip:port/;
        proxy_redirect http://localhost/ http://your_ip:port/;
        proxy_redirect http://wordpress/ http://your_ip:port/;
    }
}
